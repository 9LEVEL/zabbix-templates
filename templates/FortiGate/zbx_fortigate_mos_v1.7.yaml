              value_type: FLOAT
              params: 'min(max(93.2 - (last(//fg.sdwan.latency[{#SNMPINDEX}]) / 40) - (last(//fg.sdwan.jitter[{#SNMPINDEX}]) / 10) - (last(//fg.sdwan.packetloss[{#SNMPINDEX}]) * 2.5), 0), 93.2)'
