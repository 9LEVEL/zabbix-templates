            - uuid: 7f17c2e08a22465a9f91db11d2381a2b
              name: 'FortiGate: SDWAN [{#HC_NAME} - {#HC_IFNAME}] - R-Factor'
              type: CALCULATED
              key: 'fg.sdwan.rfactor[{#SNMPINDEX}]'
              delay: '60s'
