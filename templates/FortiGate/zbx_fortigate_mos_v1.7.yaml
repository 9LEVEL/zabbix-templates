                - name: 'FortiGate: SDWAN [{#HC_NAME} - {#HC_IFNAME}] Latencia CRITICA ({ITEM.LASTVALUE}ms)'
                  expression: 'last(/FortiGate VoIP MOS Monitor/fg.sdwan.latency[{#SNMPINDEX}])>{$LATENCY_CRITICAL}'
