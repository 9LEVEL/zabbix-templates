      valuemaps:
        - uuid: eca3ca3426f2438e963788c489aa2445
          name: 'FortiGate Link Quality'
          mappings:
            - value: '5'
              newvalue: Excelente
            - value: '4'
              newvalue: Bom
            - value: '3'
              newvalue: Aceitavel
            - value: '2'
              newvalue: Ruim
            - value: '1'
              newvalue: Inaceitavel
